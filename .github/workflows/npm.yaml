name: Publish
on:
  push:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: NPM install
        run: npm install

      - name: NPM Build
        run: npm run build

      - name: publish
        env:
          NPM_TOKEN: ${{secrets.NPM_TOKEN}}
        run: (cp package.json README.md .npmrc dist/ && cd dist && rm tsconfig.tsbuildinfo && rm -rf node-modules && npm publish --access public)
